name: Run HR Analysis Notebook

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas numpy matplotlib seaborn statsmodels nbconvert jupyter ipykernel nbformat
          python -m ipykernel install --user --name python3

      - name: Normalize notebook cell IDs
        run: python -c "import nbformat; nb = nbformat.read('dataset/hr_analysis.ipynb', as_version=4); nbformat.validate(nb); nbformat.write(nb, 'dataset/hr_analysis.ipynb')"

      - name: Execute notebook
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute \
            --ExecutePreprocessor.timeout=300 \
            --output hr_analysis_executed.ipynb \
            --output-dir dataset \
            dataset/hr_analysis.ipynb

      - name: Commit outputs back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dataset/hr_analysis_executed.ipynb dataset/outputs/
          git diff --cached --quiet || git commit -m "ci: update executed notebook and outputs [skip ci]"
          git push

      - name: Upload hr.db artifact
        uses: actions/upload-artifact@v4
        with:
          name: hr-database
          path: dataset/hr.db
