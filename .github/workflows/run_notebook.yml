name: Run HR Analysis Notebook

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  run-notebook:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install pandas numpy matplotlib seaborn statsmodels nbconvert jupyter ipykernel nbformat
          python -m ipykernel install --user --name python3

      - name: Normalize notebook cell IDs
        run: python -c "import nbformat; nb = nbformat.read('dataset/hr_analysis.ipynb', as_version=4); nbformat.validate(nb); nbformat.write(nb, 'dataset/hr_analysis.ipynb')"

      - name: Execute notebook
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute \
            --ExecutePreprocessor.timeout=300 \
            --output hr_analysis_executed.ipynb \
            --output-dir dataset \
            dataset/hr_analysis.ipynb

      - name: Profile SQLite database
        run: |
          DB=dataset/hr.db
          mkdir -p "Simple Profile"

          sqlite3 $DB ".tables"                       > "Simple Profile/db_tables.txt"
          sqlite3 $DB ".schema"                       > "Simple Profile/db_schema.txt"
          sqlite3 $DB ".indexes"                      > "Simple Profile/db_indexes.txt"

          sqlite3 -header -csv $DB "
            SELECT 'employees'    AS tbl, COUNT(*) AS rows FROM employees    UNION ALL
            SELECT 'departments',         COUNT(*)         FROM departments   UNION ALL
            SELECT 'dept_emp',            COUNT(*)         FROM dept_emp      UNION ALL
            SELECT 'dept_manager',        COUNT(*)         FROM dept_manager  UNION ALL
            SELECT 'salaries',            COUNT(*)         FROM salaries      UNION ALL
            SELECT 'titles',              COUNT(*)         FROM titles        UNION ALL
            SELECT 'analysis_flat',       COUNT(*)         FROM analysis_flat;
          " > "Simple Profile/db_row_counts.csv"

          sqlite3 -header -csv $DB "PRAGMA database_list;"   > "Simple Profile/db_pragma_database.csv"
          sqlite3 -header -csv $DB "PRAGMA integrity_check;" > "Simple Profile/db_integrity_check.txt"

          echo "SQLite profiling complete"

      - name: Commit outputs back to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dataset/hr_analysis_executed.ipynb outputs/ "Simple Profile/"
          git diff --cached --quiet || git commit -m "ci: update executed notebook, outputs, and simple profile [skip ci]"
          git push

      - name: Upload hr.db artifact
        uses: actions/upload-artifact@v4
        with:
          name: hr-database
          path: dataset/hr.db
